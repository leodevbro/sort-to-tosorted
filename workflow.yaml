# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: "1"

nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    steps:
      - name: "Scan matching typescript files and apply fixes"
        js-ast-grep:
          js_file: scripts/codemod.ts
          base_path: "."
          language: "typescript"
          include:
            - "**/*.{ts,tsx,mts,cts}"
          exclude:
            - "**/node_modules/**"
            - "**/dist/**"
            - "**/build/**"


  - id: install-package-skill
    name: Install Package Skill
    type: automatic
    steps:
      - id: install-package-skill
        name: Install package skill
        install-skill:
          package: "sort-to-tosorted"
          path: "./agents/skill/sort-to-tosorted/SKILL.md"
